<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ilusión 1</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --primary-blue: #162593;
    --light-cyan: #00e2e0;
    --bg-gray: #f8f9fa;
    --text-color: #2c3e50;
  }

  body {
    font-family: 'Poppins', sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  /* PANEL DE VISUALIZACIÓN AJUSTADO */
  .wrapper {
    width: 550px;
    height: 340px;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: #ececec;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  }

  /* ESCENA (Área de las líneas) */
  .scene {
    position: relative;
    height: 200px;
    margin: 20px; /* Margen interno para que respire */
    border-radius: 12px;
    background: #fff;
    border: 1px solid #eee;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* CONTROLES */
  .controls {
    background: #ececec;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 40px;
  }

  .label-container {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 15px;
  }

  #angleValue {
    color: var(--primary-blue);
    margin-left: 5px;
  }

  /* SLIDER CORREGIDO */
  input[type=range] {
    -webkit-appearance: none;
    appearance: none; /* Propiedad estándar para evitar errores en el editor */
    width: 100%;
    height: 12px;
    border-radius: 50px;
    background: #ddd;
    outline: none;
  }

  /* Círculo del deslizador */
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--primary-blue);
    cursor: pointer;
    border: 2px solid #fff;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    transition: transform 0.1s ease-in-out;
  }

  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.1);
  }

  /* Estilos de la ilusión */
  .line {
    position: absolute;
    width: 90%;
    left: 5%;
    height: 2px;
    background: #333;
  }

  .oblique-group {
    position: absolute;
    width: 90%;
    left: 5%;
    display: flex;
    justify-content: space-around;
  }

  .oblique {
    width: 20px;
    height: 2px;
    background: #333;
    transition: transform 0.1s ease-out;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="scene" id="canvas"></div>

  <div class="controls">
    <div class="label-container">
      Ángulo de inclinación: <span id="angleValue">30°</span>
    </div>
    <input type="range" id="angle" min="-60" max="60" value="30">
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const angleInput = document.getElementById('angle');
const angleValue = document.getElementById('angleValue');

function initIllusion() {
  canvas.innerHTML = '';
  // Ajustado para 3 líneas principales que quepan bien en 140px
  for (let i = 0; i < 5; i++) {
    const topPos = 35 + (i * 35);
    const line = document.createElement('div');
    line.className = 'line';
    line.style.top = `${topPos}px`;
    canvas.appendChild(line);

    const group = document.createElement('div');
    group.className = 'oblique-group';
    group.style.top = `${topPos}px`;
    
    for (let j = 0; j < 12; j++) {
      const oblique = document.createElement('div');
      oblique.className = 'oblique';
      group.appendChild(oblique);
    }
    canvas.appendChild(group);
  }
}

function updateVisuals() {
  const val = angleInput.value;
  const min = angleInput.min;
  const max = angleInput.max;
  
  angleValue.textContent = val + '°';

  document.querySelectorAll('.oblique-group').forEach((group, index) => {
    const direction = index % 2 === 0 ? 1 : -1;
    group.querySelectorAll('.oblique').forEach(ob => {
      ob.style.transform = `rotate(${val * direction}deg)`;
    });
  });

  // Degradado dinámico
  const percentage = (val - min) * 100 / (max - min);
  angleInput.style.background = `linear-gradient(90deg, var(--light-cyan) 0%, var(--primary-blue) ${percentage}%, #ddd ${percentage}%)`;
}

angleInput.addEventListener('input', updateVisuals);
initIllusion();
updateVisuals();
</script>

</body>
</html>
