<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ilusión 3</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-blue: #162593;
      --light-cyan: #00e2e0;
      --bg-panel: #ececec;
      --bg-preview: #ffffff;
      --text-color: #2c3e50;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: var(--text-color);
    }

    /* PANEL DE VISUALIZACIÓN: 550 x 340 px */
    .wrapper {
      width: 550px;
      height: 340px;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    /* ESCENA (Área de visualización) */
    .scene {
      position: relative;
      height: 180px; 
      margin: 20px 20px 10px 20px;
      border-radius: 12px;
      background: var(--bg-preview);
      border: 1px solid #ddd;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    /* CONTROLES */
    .controls {
      flex-grow: 1;
      background: var(--bg-panel);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 40px;
    }

    .label-container {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      text-align: center;
    }

    #sizeValue {
      color: var(--primary-blue);
      margin-left: 5px;
    }

    /* SLIDER ESTILIZADO */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 12px;
      border-radius: 50px;
      background: #ddd;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--primary-blue);
      cursor: pointer;
      border: 2px solid #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="scene">
    <canvas id="illusionCanvas" width="510" height="180"></canvas>
  </div>

  <div class="controls">
    <div class="label-container">
      Tamaño relativo: <span id="sizeValue" style="display: none;">0</span>
    </div>
    <input type="range" id="sizeSlider" min="-40" max="40" value="0">
  </div>
</div>

<script>
  const canvas = document.getElementById("illusionCanvas");
  const ctx = canvas.getContext("2d");
  const sizeSlider = document.getElementById("sizeSlider");
  const sizeValue = document.getElementById("sizeValue");

  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  const baseRadius = 35;
  const distance = 120; // Distancia fija entre círculos

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const offset = parseInt(sizeSlider.value);
    sizeValue.textContent = offset === 0 ? "Neutro" : offset > 0 ? "Cercanía" : "Lejanía";

    // Tamaños relativos
    const rA = Math.max(5, baseRadius - offset);
    const rB = Math.max(5, baseRadius + offset);

    // Dibujar Círculo Izquierdo (Referencia)
    ctx.beginPath();
    ctx.arc(centerX - distance, centerY, rA, 0, Math.PI * 2);
    ctx.fillStyle = "#162593"; // Azul principal
    ctx.fill();
    ctx.closePath();

    // Dibujar Círculo Derecho (Variable)
    ctx.beginPath();
    ctx.arc(centerX + distance, centerY, rB, 0, Math.PI * 2);
    ctx.fillStyle = "#00e2e0"; // Cyan
    ctx.fill();
    ctx.closePath();

    // Actualizar el color del slider dinámicamente
    const min = sizeSlider.min;
    const max = sizeSlider.max;
    const percentage = (offset - min) * 100 / (max - min);
    sizeSlider.style.background = `linear-gradient(90deg, var(--light-cyan) 0%, var(--primary-blue) ${percentage}%, #ddd ${percentage}%)`;
  }

  sizeSlider.addEventListener("input", draw);

  // Inicialización
  draw();
</script>

</body>
</html>
