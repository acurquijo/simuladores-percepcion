<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador M2 - 16:9</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #282828; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        #sim-container { 
            width: 1067px; 
            height: 600px; 
            position: relative; 
            overflow: hidden;
            font-family: 'Poppins', sans-serif; 
            background: #000;
        }

        .screen { width: 100%; height: 100%; position: absolute; display: none; background-size: cover; }
        .active { display: block; }
        .btn { position: absolute; cursor: pointer; transition: transform 0.2s; }
        .btn:hover { transform: scale(1.05); }
        
        #btn-start-1, #btn-restart { width: 350px; bottom: 30px; left: 358px; }
        #btn-instr { width: 324px; bottom: -35px; left: 94px; }
        #btn-start-2 { width: 324px; bottom: -39px; right: 97px; }
        
        #preview-area {
            position: absolute; top: 80px; left: 50px; width: 967px; height: 380px;
            background: url('imgs/preview.png') no-repeat center; background-size: cover;
            border-radius: 10px;
            display: flex;
            align-items: center; /* Centra la meta verticalmente */
        }

        /* LÍNEA DE META */
        #finish-line {
            position: absolute;
            right: 100px; /* Margen respecto al borde derecho */
            width: 40px;
            height: 80%; /* 80% del alto del contenedor */
            background-color: #fff;
            /* Patrón de cuadros tipo ajedrez */
            background-image: 
                conic-gradient(#000 0.25turn, transparent 0 0.5turn, #000 0.5turn 0.75turn, transparent 0);
            background-size: 20px 20px;
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 1;
        }

        #organism {
            position: absolute; top: 50%; left: 80px; width: 85px; height: 85px;
            background: url('imgs/Bee_fly.png') no-repeat center;
            background-size: contain;
            transform: translateY(-50%); transition: left 0.5s ease;
            z-index: 2; /* Por encima de la meta */
        }

        #popup { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 10; }

        .dot { 
            display: inline-block; 
            width: 20px; 
            height: 20px; 
            background-color: #bbb; 
            border-radius: 50%;
            margin-left: 10px; 
            vertical-align: middle; 
            transition: background-color 0.3s ease; 
        }

        .dot-active { 
            background-color: #00e2e0; 
            box-shadow: 0 0 10px #00e2e0; 
        }

        #nav-btns { position: absolute; bottom: 30px; left: 358px; width: 350px; height: 70px; display: flex; justify-content: center; align-items: center; }
        .btn-footer { width: 100%; cursor: pointer; }

        .bee { position: absolute; left: 30px; bottom: 15px; width: 300px; z-index: 2; animation: float 3s ease-in-out infinite; }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        #status { position: absolute; top: 25px; right: 40px; color: #fff; font-size: 25px; font-weight: bold; }
        #level-display { position: absolute; top: 20px; left: 40px; color: #fff; font-size: 20px; font-weight: bold; }
        
        #btn-a { width: 324px; bottom: -101px; left: 95px; }
        #btn-b { width: 324px; bottom: -106px; right: 97px; }

        #final-preview {
            position: absolute; top: 20px; left: 146px; width: 800px; height: 380px;
            background: url('imgs/preview.png') no-repeat center;
            background-size: cover; border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
        }

        #final-text {
            padding: 60px 100px; font-size: 18px; color: #000; text-align: center;
            line-height: 1; font-family: 'Poppins', sans-serif; margin: 0;
        }
    </style>
</head>
<body>

<div id="sim-container">
    <div id="screen-1" class="screen active" style="background-image: url('imgs/bg-1.png');">
        <img src="imgs/start.png" id="btn-start-1" class="btn" onclick="goTo('screen-2')">
    </div>

    <div id="screen-2" class="screen" style="background-image: url('imgs/bg-2.png');">
        <img src="imgs/b-instruction.png" id="btn-instr" class="btn" onclick="togglePopup(true)">
        <img src="imgs/b-start.png" id="btn-start-2" class="btn" onclick="startGameplay()">
        <div id="popup">
            <div style="position:relative; width:100%; height:100%; background: url('imgs/bg-2popup.png') center; background-size: cover;">
                <div style="position:absolute; top:80px; left:50px; width:967px; height:380px; background:url('imgs/popup-1.png') no-repeat center; background-size: cover;">
                    <p id="instr-text" style="padding-top:80px; padding-left: 100px; padding-right: 100px; font-size:18px; color: #fff; line-height: 1.6; font-family: 'Poppins', sans-serif;"></p>
                </div>
                <img src="imgs/b-close.png" class="btn" style="width:130px; top:60px; right:65px;" onclick="togglePopup(false)">
            </div>
        </div>
    </div>

    <div id="screen-3" class="screen" style="background-image: url('imgs/bg-3.png');">
        <div id="preview-area">
            <div id="finish-line"></div> <div id="organism"></div>
        </div>
        <div id="controls">
            <img src="imgs/b-a.png" id="btn-a" class="btn" onclick="pressA()">
            <img src="imgs/b-b.png" id="btn-b" class="btn" onclick="pressB()">
        </div>
        <div id="status">Intentos: 0/10</div>
        <div id="level-display">
            Nivel <span id="lvl-num">1</span> | Serie: 
            <span id="t1" class="dot"></span><span id="t2" class="dot"></span><span id="t3" class="dot"></span>
        </div>
    </div>

    <div id="screen-4" class="screen" style="background-image: url('imgs/bg-4.png');">
        <img src="imgs/Bee_surprised.png" class="bee">
        <div id="feedback-window" style="position:absolute; top:80px; left:50px; width:967px; height:380px; background:url('imgs/popup-1.png') no-repeat center; background-size: cover;">
            <h3 id="res-title" style="margin-top:80px; text-align:center; color: #fff; font-size: 28px;"></h3>
            <p id="res-text" style="padding:15px 80px; font-size:18px; color: #fff; text-align:center; line-height: 1.5; font-family: 'Poppins', sans-serif;"></p>
        </div>
        <div id="nav-btns"></div>
    </div>

    <div id="screen-5" class="screen" style="background-image: url('imgs/bg-5.png');">
        <img src="imgs/Bee_pink.png" class="bee">
        <div id="final-preview">
            <p id="final-text">
                Has experimentado cómo una actividad puede organizarse de distintas maneras según las condiciones presentes.
                <br><br>
                Distinguir estas diferencias es fundamental para comprender cómo se estructura el comportamiento en diferentes situaciones.
            </p>
        </div>
        <img src="imgs/re-start.png" id="btn-restart" class="btn" onclick="location.reload()">
    </div>
</div>

<script>
    let interactions = 0, hitsInCurrentAttempt = 0;
    let organismPos = 80;
    let currentLevel = 1, consecutiveWins = 0;
    let isWaitingForB = false, gameActive = false;
    let timerLevel, timerResponse;
    let probMoveLevel3 = 0.4;

    const MIN_LIMIT = 80; 
    const MAX_LIMIT = 850; 
    const MOVE_STEP = 20;

    function goTo(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if(screenId === 'screen-2') updateInstructions();
    }

    function updateInstructions() {
        const p = document.getElementById('instr-text');
        if(currentLevel === 1) p.innerHTML = "<h2>Nivel 1:</h2>En este nivel, la actividad progresa únicamente cuando dos eventos se relacionan en una secuencia específica dentro de un intervalo muy breve.";
        if(currentLevel === 2) p.innerHTML = "<h2>Nivel 2:</h2>En este nivel, el cambio ocurre de manera independiente. <br> Existe una acción que permite reconocer ese momento, pero no lo produce.";
        if(currentLevel === 3) p.innerHTML = "<h2>Nivel 3:</h2>En este nivel, una misma acción no siempre genera el mismo resultado. <br> Es necesario identificar cuándo ocurre el cambio relevante.";
    }

    function startGameplay() {
        resetGameplayState();
        goTo('screen-3');
        updateLevelUI();
        gameActive = true;
        if(currentLevel === 2) autoMoveCycle();
    }

    function updateLevelUI() {
        document.getElementById('lvl-num').innerText = currentLevel;
        document.getElementById('status').innerText = `Intentos: ${interactions}/10`;
        for(let i=1; i<=3; i++) {
            document.getElementById('t'+i).className = i <= consecutiveWins ? 'dot dot-active' : 'dot';
        }
    }

    function autoMoveCycle() {
        if(!gameActive || interactions >= 10 || currentLevel !== 2) return;
        timerLevel = setTimeout(() => { if(gameActive) triggerMove(); }, 1500);
    }

    function triggerMove() {
        isWaitingForB = true;
        moveOrganism(MOVE_STEP); 
        timerResponse = setTimeout(() => {
            if(isWaitingForB) {
                isWaitingForB = false;
                registerInteraction(false);
                if(currentLevel === 2 && interactions < 10) autoMoveCycle();
            }
        }, 1000);
    }

    function moveOrganism(px) {
        let target = organismPos + px;
        if (target > MAX_LIMIT) target = MAX_LIMIT;
        organismPos = target;
        document.getElementById('organism').style.left = organismPos + 'px';
    }

    function registerInteraction(isHit) {
        if (interactions >= 10 || !gameActive) return;
        interactions++;
        if (isHit) {
            hitsInCurrentAttempt++;
            moveOrganism(MOVE_STEP);
        } else {
            document.getElementById('organism').style.left = organismPos + 'px';
        }
        updateLevelUI();
        if (interactions >= 10) {
            gameActive = false;
            clearTimeout(timerLevel);
            setTimeout(showResults, 800);
        }
    }

    function pressA() {
        if(!gameActive || isWaitingForB) return;
        if(currentLevel === 1) {
            isWaitingForB = true;
            timerResponse = setTimeout(() => {
                if(isWaitingForB) { isWaitingForB = false; registerInteraction(false); }
            }, 1000);
        } 
        else if(currentLevel === 3) {
            if(consecutiveWins >= 2) { registerInteraction(true); } 
            else { if(Math.random() < probMoveLevel3) triggerMove(); }
        }
    }

    function pressB() {
        if(!gameActive) return;
        if(!isWaitingForB) { registerInteraction(false); return; }
        clearTimeout(timerResponse);
        isWaitingForB = false;
        registerInteraction(true);
        if(currentLevel === 2 && interactions < 10) autoMoveCycle();
    }

    function showResults() {
        goTo('screen-4');
        const nav = document.getElementById('nav-btns');
        const title = document.getElementById('res-title');
        const text = document.getElementById('res-text');
        
        let isCorrect = (hitsInCurrentAttempt >= 6);
        title.innerText = (hitsInCurrentAttempt <= 4) ? "Inténtalo de nuevo" : (hitsInCurrentAttempt === 5) ? "Respuesta incierta" : "Correcto";

        let feedback = "";
        if (isCorrect) {
            consecutiveWins++;
            if (currentLevel === 3 && consecutiveWins === 1) probMoveLevel3 = 0.7;
            if (currentLevel === 1) {
                feedback = consecutiveWins < 3 ? "La relación entre los eventos se mantuvo dentro del intervalo requerido." : "<strong>Nivel 1 superado.</strong><br>Se logró identificar correctamente qué organiza la actividad en este nivel.";
            } else if (currentLevel === 2) {
                feedback = consecutiveWins < 3 ? "El cambio fue reconocido en el momento adecuado." : "<strong>Nivel 2 superado.</strong><br>Se logró identificar correctamente qué organiza la actividad en este nivel.";
            } else {
                feedback = consecutiveWins < 3 ? "La respuesta se ajustó al cambio relevante." : "<strong>Nivel 3 superado.</strong><br>Se logró identificar correctamente qué organiza la actividad en este nivel.";
            }
        } else {
            consecutiveWins = 0;
            if (currentLevel === 3) probMoveLevel3 = 0.4;
            feedback = "<strong>Aún no.</strong> Es necesario mayor precisión en el momento de la acción.";
        }

        text.innerHTML = feedback;
        nav.innerHTML = "";
        let btn = document.createElement('img');
        btn.className = "btn-footer";

        if (consecutiveWins >= 3) {
            if (currentLevel < 3) {
                btn.src = "imgs/next-level.png";
                btn.onclick = () => { currentLevel++; consecutiveWins = 0; startGameplay(); };
            } else {
                btn.src = "imgs/end.png";
                btn.onclick = () => goTo('screen-5');
            }
        } else {
            btn.src = "imgs/next-try.png";
            btn.onclick = () => startGameplay();
        }
        nav.appendChild(btn);
    }

    function resetGameplayState() {
        interactions = 0; hitsInCurrentAttempt = 0; organismPos = 80;
        isWaitingForB = false; gameActive = false;
        clearTimeout(timerLevel);
        clearTimeout(timerResponse);
        document.getElementById('organism').style.left = '80px';
    }

    function togglePopup(show) { document.getElementById('popup').style.display = show ? 'block' : 'none'; }
</script>
</body>
</html>
