<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador 2</title>
    <style>
        body {
            background: #282828;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #sim-container {
            width: 550px;
            height: 340px;
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            font-family: Arial, sans-serif;
        }
        .screen {
            width: 100%;
            height: 100%;
            position: absolute;
            display: none;
            background-size: cover;
        }
        .active { display: block; }
        .btn { position: absolute; cursor: pointer; }

        /* Estilo para deshabilitar clics visualmente */
        .disabled { pointer-events: none; opacity: 0.7; }

        #btn-start-1 { width: 250px;bottom: 1px; left: 150px; }
        #btn-instr { bottom: -28px; left: 30px; }
        #btn-start-2 { bottom: -28px; right: 50px; }
        
        #preview-area {
            position: absolute;
            top: 40px; left: 20px;
            width: 500px; height: 205px;
            background: url('imgs/preview.png') no-repeat center;
            background-size: cover;
        }

        #organism {
            position: absolute;
            top: 50%; 
            left: 60px; /* Posición inicial fija */
            width: 30px; height: 30px;
            background-color: #162593;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 226, 224, 0.8);;
            transform: translateY(-50%);
            transition: left 0.5s ease; /* Movimiento suave */
        }

        #popup {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="sim-container">
    <div id="screen-1" class="screen active" style="background-image: url('imgs/bg-1.png');">
        <img src="imgs/start.png" id="btn-start-1" class="btn" onclick="goTo('screen-2')">
    </div>

    <div id="screen-2" class="screen" style="background-image: url('imgs/bg-2.png');">
        <img src="imgs/b-instruction.png" id="btn-instr" class="btn" onclick="togglePopup(true)">
        <img src="imgs/b-start.png" id="btn-start-2" class="btn" onclick="goTo('screen-3')">

        <div id="popup">
            <div style="position:relative; width:100%; height:100%; background: url('imgs/bg-2popup.png');">
                <img src="imgs/b-instruction.png" class="btn" style="left:30px; bottom:-28px;">
                <img src="imgs/b-start-grey.png" class="btn" style="right:50px; bottom:-28px;">
                <div style="position:absolute; top:20px; left:20px; width:500px; height:205px; background:url('imgs/popup-1.png') no-repeat center center; background-size: cover;">
                    <p style="padding:60px; font-size:12px; color: #fff;">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor.</p>
                </div>
                <img src="imgs/b-close.png" class="btn" style="width:100px ;top:5px; right:15px;" onclick="togglePopup(false)">
            </div>
        </div>
    </div>

    <div id="screen-3" class="screen" style="background-image: url('imgs/bg-3.png');">
        <div id="preview-area">
            <div id="organism"></div>
        </div>
        <div id="controls">
            <img src="imgs/b-a.png" id="btn-a" class="btn" style="bottom:-28px; left:45px;" onclick="pressA()">
            <img src="imgs/b-b.png" id="btn-b" class="btn" style="bottom:-28px; right:50px;" onclick="pressB()">
        </div>
        <div id="status" style="position:absolute; top:13px; right:10px; color: #fff;">Intentos: 0/10</div>
    </div>

    <div id="screen-4" class="screen" style="background-image: url('imgs/bg-4.png');">
        <img src="imgs/bee.png" style="position:absolute; left:0px; bottom:0px; width:200px; z-index: 2;">
        <div id="feedback-window" style="position:absolute; top:20px; left:20px; width:500px; height:205px; background:url('imgs/popup-1.png') no-repeat center center; background-size: cover;">
            <h3 id="res-title" style="margin-top:60px; text-align:center; color: #fff;"></h3>
            <p id="res-text" style="padding:10px 60px; font-size:12px; color: #fff;"></p>
        </div>
        <img src="imgs/b-retry.png" class="btn" style="width:100px ;top:5px; right:15px;" onclick="location.reload()">
    </div>
</div>

<script>
    let attempts = 0;
    let successfulSequences = 0;
    let organismPos = 60;
    let isWaitingForB = false;
    let isMoving = false;
    let timerA = null;

    function goTo(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function togglePopup(show) {
        document.getElementById('popup').style.display = show ? 'block' : 'none';
    }

    function lockControls(lock) {
        isMoving = lock;
        const controls = document.getElementById('controls');
        lock ? controls.classList.add('disabled') : controls.classList.remove('disabled');
    }

    function registerAttempt(isSuccess, direction) {
        if (attempts >= 10) return;
        
        attempts++;
        if (isSuccess) {
            successfulSequences++;
            organismPos += 40; // Avanza
        } else {
            if (direction === 'back') {
                organismPos = Math.max(60, organismPos - 30); // Retrocede pero no menos de 60
            }
            // Si es 'stay', organismPos no cambia
        }

        // Actualizar visual
        document.getElementById('organism').style.left = organismPos + 'px';
        document.getElementById('status').innerText = `Intentos: ${attempts}/10`;

        // Bloquear mientras se mueve (0.5s de la transición CSS)
        lockControls(true);
        setTimeout(() => {
            if (attempts < 10) lockControls(false);
            else showResults();
        }, 600);
    }

    function pressA() {
        if (isMoving || attempts >= 10 || isWaitingForB) return;

        isWaitingForB = true;
        // Esperar 1 segundo a ver si presiona B
        timerA = setTimeout(() => {
            if (isWaitingForB) {
                isWaitingForB = false;
                registerAttempt(false, 'stay'); // Solo A y pasó el tiempo = intento fallido, se queda quieto
            }
        }, 1000);
    }

    function pressB() {
        if (isMoving || attempts >= 10) return;

        if (isWaitingForB) {
            // ÉXITO: A y luego B antes de 1s
            clearTimeout(timerA);
            isWaitingForB = false;
            registerAttempt(true, 'forward');
        } else {
            // ERROR: B solo o B y luego A (aquí capturamos B inicial)
            registerAttempt(false, 'back'); // Retrocede o se queda quieto según pidas
        }
    }

    function showResults() {
        goTo('screen-4');
        const title = document.getElementById('res-title');
        const text = document.getElementById('res-text');
        const lorem = "Lorem ipsum dolor sit amet, consectetur adipiscing elit.";

        if (successfulSequences <= 4) {
            title.innerText = "Respuesta fallida";
            text.innerText = "No lograste completar la secuencia correctamente.";
        } else if (successfulSequences === 5) {
            title.innerText = "Respuesta incierta";
            text.innerText = lorem;
        } else {
            title.innerText = "Respuesta acertada";
            text.innerText = "¡Excelente! Lograste completar la secuencia.";
        }
    }
</script>
</body>
</html>
