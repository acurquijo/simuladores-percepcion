<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador M2</title>
    <style>
        body { background: #282828; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #sim-container { width: 550px; height: 340px; position: relative; overflow: hidden; border-radius: 15px; font-family: Arial, sans-serif; }
        .screen { width: 100%; height: 100%; position: absolute; display: none; background-size: cover; }
        .active { display: block; }
        .btn { position: absolute; cursor: pointer; }
        
        #btn-start-1, #btn-restart { width: 250px; bottom: 1px; left: 150px; }
        #btn-instr { bottom: -28px; left: 30px; }
        #btn-start-2 { bottom: -28px; right: 50px; }
        
        #preview-area {
            position: absolute; top: 40px; left: 20px; width: 500px; height: 205px;
            background: url('imgs/preview.png') no-repeat center; background-size: cover;
        }

        #organism {
            position: absolute; top: 50%; left: 60px; width: 30px; height: 30px;
            background-color: #162593; border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 226, 224, 0.8);
            transform: translateY(-50%); transition: left 0.5s ease, border-radius 0.3s ease, background-color 0.3s ease;
        }

        .organic-shape { border-radius: 20% 80% 30% 70% !important; background-color: #e2641a !important; transform: translateY(-50%) rotate(45deg) !important; }

        #popup { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 10; }

        .triangle { display: inline-block; width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 14px solid #bbb; margin-left: 5px; vertical-align: middle; }
        .tri-active { border-bottom-color: #00e2e0; }

        #nav-btns { position: absolute; bottom: 1px; left: 150px; width: 250px; height: 114px; display: flex; justify-content: center; }
        .btn-footer { 
            width: 100%;       /* Cambia el ancho aquí */
            cursor: pointer;    /* Hace que aparezca la mano al pasar el ratón */
            /* Puedes agregar más estilos aquí, por ejemplo: */
            transition: transform 0.2s; 
        }

        .btn-footer:hover {
            transform: scale(1.05); /* Efecto de aumento al pasar el mouse */
        }

        .bee { position: absolute; left: 0px; bottom: 0px; width: 200px; z-index: 2; }
    </style>
</head>
<body>

<div id="sim-container">
    <div id="screen-1" class="screen active" style="background-image: url('imgs/bg-1.png');">
        <img src="imgs/start.png" id="btn-start-1" class="btn" onclick="goTo('screen-2')">
    </div>

    <div id="screen-2" class="screen" style="background-image: url('imgs/bg-2.png');">
        <img src="imgs/b-instruction.png" id="btn-instr" class="btn" onclick="togglePopup(true)">
        <img src="imgs/b-start.png" id="btn-start-2" class="btn" onclick="startGameplay()">
        <div id="popup">
            <div style="position:relative; width:100%; height:100%; background: url('imgs/bg-2popup.png');">
                <div style="position:absolute; top:20px; left:20px; width:500px; height:205px; background:url('imgs/popup-1.png') no-repeat center center; background-size: cover;">
                    <p id="instr-text" style="padding:60px; font-size:12px; color: #fff;"></p>
                </div>
                <img src="imgs/b-close.png" class="btn" style="width:100px; top:5px; right:15px;" onclick="togglePopup(false)">
            </div>
        </div>
    </div>

    <div id="screen-3" class="screen" style="background-image: url('imgs/bg-3.png');">
        <div id="preview-area"><div id="organism"></div></div>
        <div id="controls">
            <img src="imgs/b-a.png" id="btn-a" class="btn" style="bottom:-28px; left:45px;" onclick="pressA()">
            <img src="imgs/b-b.png" id="btn-b" class="btn" style="bottom:-28px; right:50px;" onclick="pressB()">
        </div>
        <div id="status" style="position:absolute; top:13px; right:20px; color: #fff; font-size:14px; font-weight:bold;">Intentos: 0/10</div>
        <div id="level-display" style="position:absolute; top:10px; left:20px; color: #fff; font-size:14px; font-weight: bold;">
            Nivel <span id="lvl-num">1</span> | Repeticiones: 
            <span id="t1" class="triangle"></span><span id="t2" class="triangle"></span><span id="t3" class="triangle"></span>
        </div>
    </div>

    <div id="screen-4" class="screen" style="background-image: url('imgs/bg-4.png');">
        <img src="imgs/bee.png" class="bee">
        <div id="feedback-window" style="position:absolute; top:20px; left:20px; width:500px; height:205px; background:url('imgs/popup-1.png') no-repeat center center; background-size: cover;">
            <h3 id="res-title" style="margin-top:60px; text-align:center; color: #fff;"></h3>
            <p id="res-text" style="padding:10px 60px; font-size:12px; color: #fff; text-align:center;"></p>
        </div>
        <img src="imgs/b-retry.png" class="btn" style="width:100px; top:5px; right:15px;" onclick="retryLevel()">
        <div id="nav-btns"></div>
    </div>

    <div id="screen-5" class="screen" style="background-image: url('imgs/bg-1.png');">
        <img src="imgs/bee.png" class="bee">
        <img src="imgs/re-start.png" id="btn-restart" class="btn" onclick="location.reload()">
    </div>
</div>

<script>
    let attempts = 0, successfulSequences = 0, organismPos = 60;
    let isWaitingForB = false, isOrganic = false, timerA = null, timerLevel2 = null;
    let currentLevel = 1, levelRepetitions = 1;
    let moveDirection = 1; 

    // Límites estrictos del área de juego (500px de ancho)
    const MIN_LIMIT = 60; 
    const MAX_LIMIT = 500 - 30 - 60; // AnchoDiv - AnchoOrg - MargenDerecho (410px)

    function goTo(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if(screenId === 'screen-2') updateInstructions();
    }

    function startGameplay() {
        resetGameplayState();
        goTo('screen-3');
        updateLevelUI();
        if(currentLevel === 2) planNextOrganicChange();
    }

    function updateInstructions() {
        const p = document.getElementById('instr-text');
        if(currentLevel === 1) p.innerText = "Nivel 1: Presiona A y luego B (antes de 1 segundo) para avanzar.";
        if(currentLevel === 2) p.innerText = "Nivel 2: El organismo cambiará de forma solo. Presiona B rápidamente cuando cambie.";
        if(currentLevel === 3) p.innerText = "Nivel 3: Al presionar A el organismo puede cambiar. Si cambia, presiona B. Si presionas A de nuevo, fallarás.";
    }

    function updateLevelUI() {
        document.getElementById('lvl-num').innerText = currentLevel;
        document.getElementById('status').innerText = `Intentos: ${attempts}/10`;
        for(let i=1; i<=3; i++) {
            document.getElementById('t'+i).className = i <= levelRepetitions ? 'triangle tri-active' : 'triangle';
        }
    }

    function togglePopup(show) { document.getElementById('popup').style.display = show ? 'block' : 'none'; }

    function planNextOrganicChange() {
        if(attempts >= 10 || currentLevel !== 2) return;
        timerLevel2 = setTimeout(triggerOrganicForm, Math.random() * 2000 + 2000);
    }

    function triggerOrganicForm() {
        if(attempts >= 10) return;
        isOrganic = true;
        document.getElementById('organism').classList.add('organic-shape');
        setTimeout(() => {
            if(isOrganic) {
                isOrganic = false;
                document.getElementById('organism').classList.remove('organic-shape');
                registerAttempt(false);
                if(currentLevel === 2) planNextOrganicChange();
            }
        }, 1000);
    }

    function moveOrganism(px) {
        let step = px * moveDirection;
        let targetPos = organismPos + step;

        // Si el movimiento se sale de los límites, invertir dirección
        if (targetPos > MAX_LIMIT || targetPos < MIN_LIMIT) {
            moveDirection *= -1;
            targetPos = organismPos + (px * moveDirection);
        }

        // Aplicar posición final con abrazadera de seguridad
        organismPos = Math.max(MIN_LIMIT, Math.min(MAX_LIMIT, targetPos));
        document.getElementById('organism').style.left = organismPos + 'px';
    }

    function registerAttempt(isSuccess) {
        if (attempts >= 10) return;
        attempts++;
        if (isSuccess) {
            successfulSequences++;
            moveOrganism(40);
        } else {
            // Retroceso: se mueve 20px en dirección contraria al flujo actual
            let backStep = 20 * (moveDirection * -1);
            let targetPos = organismPos + backStep;
            organismPos = Math.max(MIN_LIMIT, Math.min(MAX_LIMIT, targetPos));
            document.getElementById('organism').style.left = organismPos + 'px';
        }
        updateLevelUI();
        if (attempts >= 10) setTimeout(showResults, 800);
    }

    function pressA() {
        if (attempts >= 10) return;
        if(currentLevel === 1) {
            if(isWaitingForB) return;
            isWaitingForB = true;
            timerA = setTimeout(() => { if(isWaitingForB) { isWaitingForB = false; registerAttempt(false); } }, 1000);
        } else if(currentLevel === 2) {
            moveOrganism(20);
        } else if(currentLevel === 3) {
            if(isOrganic) { 
                isOrganic = false;
                document.getElementById('organism').classList.remove('organic-shape');
                registerAttempt(false);
            } else {
                moveOrganism(20);
                if(Math.random() > 0.6) triggerOrganicForm();
            }
        }
    }

    function pressB() {
        if (attempts >= 10) return;
        if(currentLevel === 1) {
            if(isWaitingForB) { clearTimeout(timerA); isWaitingForB = false; registerAttempt(true); }
            else registerAttempt(false);
        } else {
            if(isOrganic) { 
                isOrganic = false;
                document.getElementById('organism').classList.remove('organic-shape');
                registerAttempt(true); 
                if(currentLevel === 2) planNextOrganicChange(); 
            } else registerAttempt(false);
        }
    }

    function showResults() {
        clearTimeout(timerLevel2);
        goTo('screen-4');
        const nav = document.getElementById('nav-btns');
        let result = (successfulSequences <= 4) ? "Respuesta fallida" : (successfulSequences === 5) ? "Respuesta incierta" : "Respuesta acertada";
        document.getElementById('res-title').innerText = result;
        document.getElementById('res-text').innerText = `Nivel ${currentLevel} - Repetición ${levelRepetitions}/3\nAciertos: ${successfulSequences}/10`;
        nav.innerHTML = "";
        let btnNext = document.createElement('img');
        btnNext.className = "btn-footer";
        if(levelRepetitions < 3) {
            btnNext.src = "imgs/next-try.png";
            btnNext.onclick = () => { levelRepetitions++; startGameplay(); };
        } else if(currentLevel < 3) {
            btnNext.src = "imgs/next-level.png";
            btnNext.onclick = () => { currentLevel++; levelRepetitions = 1; startGameplay(); };
        } else {
            btnNext.src = "imgs/end.png";
            btnNext.onclick = () => goTo('screen-5');
        }
        nav.appendChild(btnNext);
    }

    function retryLevel() { resetGameplayState(); goTo('screen-2'); }

    function resetGameplayState() {
        attempts = 0; successfulSequences = 0; organismPos = 60;
        isWaitingForB = false; isOrganic = false; moveDirection = 1;
        clearTimeout(timerLevel2);
        if(timerA) clearTimeout(timerA);
        const org = document.getElementById('organism');
        org.classList.remove('organic-shape');
        org.style.left = '60px';
    }
</script>
</body>
</html>
