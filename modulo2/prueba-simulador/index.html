<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-default: #f4f4f4;
            --org-default: #162593;
            --org-active: #00e2e0;
            --success-bg: #d4edda;
            --fail-bg: #f8d7da;
        }

        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #222; }

        #sim-container {
            width: 550px;
            height: 340px;
            background-color: var(--bg-default);
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s;
        }

        /* Marcador de Intentos */
        #header { width: 100%; padding: 10px; text-align: center; background: rgba(255,255,255,0.5); font-weight: bold; }

        /* Organismo */
        #organismo {
            width: 80px;
            height: 80px;
            background-color: var(--org-default);
            border-radius: 50%;
            margin-top: 40px;
            transition: background-color 0.3s, transform 0.2s;
        }

        .ripple { animation: ripple-effect 0.4s linear; }
        @keyframes ripple-effect {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); border: 2px solid #ccc; }
            100% { transform: scale(1); }
        }

        /* Controles */
        #controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 50px;
        }

        .objeto {
            width: 60px;
            height: 60px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            border-radius: 4px;
            user-select: none;
            transition: transform 0.1s;
        }
        .objeto:active { transform: scale(0.9); }
        
        #objA { background: #444; border: 2px solid #162593; color: #fff; }
        #objB { background: #444; border: 2px dashed #999; color: #fff; }

        /* Pop-up */
        #overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            cursor: pointer;
            background: #fff;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="sim-container">
    <div id="header">Intentos: <span id="count">0</span> / 10</div>
    
    <div id="organismo"></div>

    <div id="controls">
        <div id="objA" class="objeto" onclick="handleAction(true)">A</div>
        <div id="objB" class="objeto" onclick="handleAction(false)">B</div>
    </div>

    <div id="overlay">
        <h2 id="msg"></h2>
        <button onclick="resetSim()">Reiniciar simulación</button>
    </div>
</div>

<script>
    let clicksA = 0;
    let totalAttempts = 0;
    const maxAttempts = 10;
    const container = document.getElementById('sim-container');
    const organismo = document.getElementById('organismo');
    const countDisplay = document.getElementById('count');
    const overlay = document.getElementById('overlay');
    const msg = document.getElementById('msg');

    function handleAction(isA) {
        if (totalAttempts >= maxAttempts) return;

        totalAttempts++;
        countDisplay.innerText = totalAttempts;

        if (isA) {
            clicksA++;
            // Efecto A
            container.style.backgroundColor = "#d4edda"; // Verde
            organismo.style.backgroundColor = "#00e2e0";
            
            setTimeout(() => {
                if(totalAttempts < maxAttempts) revertStyles();
            }, 1000);
        } else {
            // Efecto B
            container.style.backgroundColor = "#f8d7da"; // Rojo
            organismo.classList.add('ripple');
            
            setTimeout(() => {
                organismo.classList.remove('ripple');
                if(totalAttempts < maxAttempts) revertStyles();
            }, 1000);
        }

        if (totalAttempts === maxAttempts) {
            setTimeout(showResults, 1100);
        }
    }

    function revertStyles() {
        container.style.backgroundColor = "#f4f4f4";
        organismo.style.backgroundColor = "#162593";
    }

    function showResults() {
        overlay.style.display = "flex";
        
        if (clicksA >= 6) {
            msg.innerText = "Simulación exitosa";
            container.style.backgroundColor = "#d4edda";
            organismo.style.backgroundColor = "#00e2e0";
        } else if (clicksA <= 4) {
            msg.innerText = "Simulación fallida";
            container.style.backgroundColor = "#f8d7da";
            organismo.style.backgroundColor = "#162593";
        } else {
            msg.innerText = "Resultado incierto";
            container.style.backgroundColor = "#f8d7da";
            organismo.style.backgroundColor = "#00e2e0";
        }
    }

    function resetSim() {
        clicksA = 0;
        totalAttempts = 0;
        countDisplay.innerText = "0";
        overlay.style.display = "none";
        revertStyles();
    }
</script>

</body>
</html>
